<!doctype html>
<html><head>
<meta charset="utf-8">
<title>Cholon · Refresh</title>
<style>
  html, body { height: 100%; margin: 0; }
  body { font: 14px/1.5 -apple-system, Segoe UI, Helvetica, sans-serif;
         background: #0f172a; color: #e2e8f0;
         display: flex; align-items: center; justify-content: center; flex-direction: column; }
  .card { background: #1e293b; padding: 28px 36px; border-radius: 8px; min-width: 320px;
          border: 1px solid #334155; text-align: center; }
  h1 { margin: 0 0 12px; font-size: 18px; font-weight: 600; }
  .status { color: #94a3b8; font-size: 13px; line-height: 1.7; }
  .ok { color: #10b981; }
  .err { color: #ef4444; }
  .spinner { display: inline-block; width: 14px; height: 14px;
             border: 2px solid #334155; border-top-color: #06b6d4;
             border-radius: 50%; animation: spin .8s linear infinite;
             vertical-align: -3px; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <h1>Refreshing Cholon data</h1>
  <div class="status" id="status"><span class="spinner"></span> Pulling latest orders from Fresto…</div>
</div>
<script>
(async () => {
  const params = new URLSearchParams(location.search);
  const token = params.get("token");
  const dash = params.get("dash");
  const statusEl = document.getElementById("status");
  const SYNC = "https://ybpadmmooftyptagvnje.supabase.co/functions/v1/fresto-sync";

  if (!token) {
    statusEl.innerHTML = '<span class="err">Missing token. Close this tab.</span>';
    return;
  }

  try {
    const res = await fetch(SYNC + "?token=" + encodeURIComponent(token));
    const j = await res.json().catch(() => null);
    if (!res.ok || !j?.ok) {
      throw new Error(j?.error || ("HTTP " + res.status));
    }

    // Reload the originating dashboard tab so Lightdash re-queries Postgres.
    try {
      if (window.opener && !window.opener.closed && dash) {
        const sep = dash.includes("?") ? "&" : "?";
        window.opener.location.href = dash + sep + "_synced=" + Date.now();
      }
    } catch (_) { /* cross-origin restrictions: ignore */ }

    statusEl.innerHTML =
      '<span class="ok">✓ Synced ' + j.orders + ' orders, ' + j.lines +
      ' lines in ' + j.elapsed_seconds + 's.</span><br>' +
      '<span style="color:#64748b;font-size:12px">Dashboard refreshed. This tab will close.</span>';

    // Best-effort tab close. Browsers may block this if the tab wasn't
    // opened by window.open(); in that case the user closes it manually.
    setTimeout(() => { try { window.close(); } catch (_) {} }, 800);
  } catch (e) {
    statusEl.innerHTML = '<span class="err">Sync failed: ' + (e.message || e) + '</span>';
  }
})();
</script>
</body>
</html>
